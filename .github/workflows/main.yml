name: Yahoo Finance Alert Scheduler

on:
  schedule:
    # Runs every 15 minutes (Standard Cron Syntax)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to trigger the script manually from the UI

jobs:
  run-alert-script:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Run news alert script
        run: python monitor.py
