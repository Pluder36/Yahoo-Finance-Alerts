name: Yahoo Finance Alert Scheduler

on:
  schedule:
    # Runs every 15 minutes (Standard Cron Syntax)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to trigger the script manually from the UI

jobs:
  run-alert-script:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance

      - name: Run news alert script
        env:
          WEBHOOK_URL: "https://discordapp.com/api/webhooks/1523334052491563048/YICnA8YiqKBlkTayRLWurF-gmbr7VjrD64zR-szLHWnM0YGCwY2YCRwlizB07EWqwJvr"
        run: python .github/monitor.py

      - name: Commit state file
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add seen_urls.txt
          git commit -m "Update seen URLs" || echo "No changes to commit"
          git push
